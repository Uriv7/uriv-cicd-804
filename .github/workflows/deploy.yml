name: Deploy to S3

on:
  push:
    branches:
      - main


# Set the environment variable globally for this workflow to use Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Check if v4.1.0 or newer is available, or use @v4
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        # Upgrade to v4 to ensure compatibility with newer Node runtimes
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync ./Color-Inspector-Pro-main s3://${{ secrets.S3_BUCKET }} --delete
